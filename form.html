<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión — Töbá</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
 .tata{
    display: flex;
    justify-content: center; /* Centrado horizontal */
    align-items: center;     /* Centrado vertical */
    min-height: 10vh;       /* Al menos el 100% de la altura de la pantalla */
    background-color: #fcf9f2; /* Color de fondo suave (opcional) */
 }
  .btn-crear-cuenta {
   justify-content: center; /* Centrado horizontal */
    align-items: center;  
    background-color: #800000; /* Color blanco de fondo */
    color: #ffffff; /* Color vino para las letras */
    padding: 12px 24px; /* Espaciado interno */
    border-radius: 8px; /* Bordes redondeados */
    text-decoration: none; /* Quita la línea de enlace tradicional */
    font-weight: bold;
    text-align: center;
    transition: background-color 0.3s ease;
}

/* ============ TOKENS ORIGINALES ============ */
:root{
  --cream:        #f5f0e0;
  --cream-deep:   #ece2c6;
  --ink:          #211a14;
  --ink-soft:     #5b5246;
  --brick:        #991919;
  --brick-deep:   #6b1010;
  --brick-bright: #c22424;
  --gold:         #c9a449;
  --green:        #2d6a4f;
  --white:        #fffdf8;
  --line:         rgba(33,26,20,0.12);

  --display: 'Fraunces', serif;
  --body: 'Inter', sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family: var(--body);
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
  position: relative;
  overflow-x: hidden;
}

/* ============ MOLA DIVIDER BACKGROUND ============ */
.mola-bg-top, .mola-bg-bottom {
  position: absolute;
  left: 0;
  right: 0;
  height: 20px;
  width: 100%;
  background:
    repeating-linear-gradient(135deg, transparent 0 8px, rgba(153,25,25,0.08) 8px 16px),
    repeating-linear-gradient(45deg, transparent 0 8px, rgba(201,164,73,0.15) 8px 16px);
}
.mola-bg-top { top: 0; border-bottom: 3px solid var(--brick); }
.mola-bg-bottom { bottom: 0; border-top: 3px solid var(--brick); transform: scaleY(-1); }

/* ============ LOGO INTERFAZ ============ */
.login-header {
  text-align: center;
  margin-bottom: 32px;
}
.logo{
  display:inline-flex; align-items:center; gap:10px;
  font-family:var(--display); font-weight:700; font-size:2rem;
  color:var(--brick);
  text-decoration: none;
  margin-bottom: 12px;
}
.logo-mark{
  width:44px;height:44px;border-radius:50%;
  background: var(--brick);
  display:flex;align-items:center;justify-content:center;
  color:var(--cream); font-size:1.3rem;
  position:relative;
}
.logo-mark::after{
  content:"";
  position:absolute; inset:5px;
  border:1.5px solid var(--gold);
  border-radius:50%;
}
.login-header p {
  font-size: 0.95rem;
  color: var(--ink-soft);
  font-weight: 500;
}

/* ============ CONTENEDOR PRINCIPAL ============ */
.login-card {
  background: var(--white);
  max-width: 440px;
  width: 100%;
  border-radius: 18px;
  padding: 40px;
  box-shadow: 0 24px 50px -15px rgba(33,26,20,0.15);
  border: 1px solid var(--line);
  position: relative;
}

/* Detalle sutil de marco Mola superior interno */
.login-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: var(--brick);
  border-radius: 18px 18px 0 0;
}

.login-card h1 {
  font-family: var(--display);
  font-size: 1.8rem;
  font-weight: 600;
  margin-bottom: 24px;
  text-align: center;
}

/* ============ COMPONENTES DE FORMULARIO ============ */
.form-group {
  margin-bottom: 20px;
}
.form-group label {
  display: block;
  font-size: 0.85rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ink-soft);
  margin-bottom: 8px;
}
.input-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}
.input-wrapper input {
  width: 100%;
  padding: 14px 16px;
  border-radius: 10px;
  border: 1.5px solid var(--line);
  background: var(--cream);
  font-family: var(--body);
  font-size: 0.95rem;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s, background-color 0.2s;
}
.input-wrapper input:focus {
  border-color: var(--gold);
  background: var(--white);
}

/* Opciones extras (Recordarme / Olvidé contraseña) */
.form-options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.88rem;
  margin-bottom: 26px;
}
.remember-me {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  color: var(--ink-soft);
}
.remember-me input {
  accent-color: var(--brick);
  width: 16px;
  height: 16px;
}
.forgot-pass {
  color: var(--brick);
  font-weight: 600;
  text-decoration: none;
  transition: color 0.2s;
}
.forgot-pass:hover {
  color: var(--brick-bright);
  text-decoration: underline;
}

/* Botón de acción principal */
.btn-submit {
  width: 100%;
  background: var(--brick);
  color: var(--white);
  padding: 16px;
  border: none;
  border-radius: 10px;
  font-family: var(--body);
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(153,25,25,0.25);
  transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
}
.btn-submit:hover {
  background: var(--brick-deep);
  transform: translateY(-2px);
  box-shadow: 0 12px 24px rgba(153,25,25,0.35);
}
.btn-submit:active {
  transform: translateY(0);
}

/* ============ FOOTER CARD (Enlaces de registro) ============ */
.login-footer {
  text-align: center;
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid var(--line);
  font-size: 0.9rem;
  color: var(--ink-soft);
}
.login-footer a {
  color: var(--brick);
  font-weight: 700;
  text-decoration: none;
  margin-left: 4px;
}
.login-footer a:hover {
  text-decoration: underline;
}

/* Detalle decorativo del diamante */
.diamond-spacer {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 24px;
}
.diamond {
  width: 8px;
  height: 8px;
  background: var(--gold);
  transform: rotate(45deg);
}
</style>
</head>
<body>

<!-- Bordes decorativos estilo Mola de fondo -->
<div class="mola-bg-top"></div>
<div class="mola-bg-bottom"></div>

<div class="login-header">
  <a href="landing.html" class="logo">
    <span class="logo-mark">T</span> Töbá
  </a>
  <p>Aprende las lenguas indígenas de Panamá</p>
</div>

<div class="login-card">
  <h1>Nuedi gani (Bienvenido)</h1>
  
  <form action="#autenticar" method="POST">
    
    <!-- Campo: Correo Electrónico -->
    <div class="form-group">
      <label for="email">Correo electrónico</label>
      <div class="input-wrapper">
        <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required autocomplete="email">
      </div>
    </div>
    
    <!-- Campo: Contraseña -->
    <div class="form-group">
      <label for="password">Contraseña</label>
      <div class="input-wrapper">
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
    </div>
    
    <!-- Opciones extras -->
    <div class="form-options">
      <label class="remember-me">
        <input type="checkbox" name="remember">
        <span>Recordarme</span>
      </label>
      <a href="#recuperar" class="forgot-pass">¿Olvidaste tu contraseña?</a>
    </div>
    
    <div class="tata">
     <a href="toba.html" class="btn-crear-cuenta">
    Iniciar sesión
</a>
</div>
  
    
    
  </form>

  <!-- Pie del formulario (Registro alterno) -->
  <div class="login-footer">
    ¿Eres nuevo en Töbá? <a href="#registro">Crea una cuenta</a>
  </div>
  
  <!-- Detalle estético final -->
  <div class="diamond-spacer">
    <div class="diamond"></div>
  </div>
</div>

</body>
</html>
